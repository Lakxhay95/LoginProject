<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | CodeForSuccess</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#020617,#0f172a,#1d4ed8);
            overflow:hidden;
            position:relative;
        }

        body::before{
            content:'';
            position:absolute;
            width:350px;
            height:350px;
            background:#8b5cf6;
            border-radius:50%;
            top:-120px;
            right:-100px;
            filter:blur(120px);
            opacity:0.5;
        }

        .login-box{
            width:400px;
            padding:45px;
            border-radius:25px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.12);
            backdrop-filter:blur(18px);
            box-shadow:0 20px 50px rgba(0,0,0,0.45);
            color:white;
            position:relative;
            z-index:2;
        }

        h1{
            text-align:center;
            margin-bottom:10px;
            font-size:2.3rem;
        }

        .subtitle{
            text-align:center;
            color:#cbd5e1;
            margin-bottom:35px;
            font-size:0.95rem;
        }

        .input-group{
            margin-bottom:22px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            color:#e2e8f0;
            font-size:0.95rem;
        }

        .input-group input{
            width:100%;
            padding:15px;
            border:none;
            outline:none;
            border-radius:14px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.08);
            color:white;
            font-size:1rem;
            transition:0.3s;
        }

        .input-group input:focus{
            border-color:#60a5fa;
            box-shadow:0 0 0 4px rgba(96,165,250,0.2);
        }

        .input-group input::placeholder{
            color:#94a3b8;
        }

        .btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:14px;
            background:linear-gradient(135deg,#8b5cf6,#3b82f6);
            color:white;
            font-size:1rem;
            font-weight:600;
            cursor:pointer;
            transition:0.35s;
            margin-top:10px;
            box-shadow:0 15px 30px rgba(59,130,246,0.35);
        }

        .btn:hover{
            transform:translateY(-4px);
        }

        .footer-text{
            margin-top:25px;
            text-align:center;
            color:#cbd5e1;
            font-size:0.9rem;
        }

        .footer-text a{
            color:#93c5fd;
            text-decoration:none;
            font-weight:600;
        }
    </style>
</head>
<body>

    <form method="post" action="login" class="login-box">
        <h1>Welcome Back</h1>
        <p class="subtitle">Login to continue your coding journey</p>

        <div class="input-group">
            <label>Username</label>
            <input type="text" name="uname" placeholder="Enter your username">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="pword" placeholder="Enter your password">
        </div>

        <input type="submit" value="Login" class="btn">

        <div class="footer-text">
            Don't have an account?
            <a href="reg.html">Register</a>
        </div>
    </form>

</body>
</html>
