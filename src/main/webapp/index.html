<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeForSuccess</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b,#312e81);
            overflow:hidden;
            position:relative;
        }

        body::before,
        body::after{
            content:'';
            position:absolute;
            width:400px;
            height:400px;
            border-radius:50%;
            filter:blur(100px);
            opacity:0.5;
        }

        body::before{
            background:#7c3aed;
            top:-120px;
            left:-120px;
        }

        body::after{
            background:#06b6d4;
            bottom:-120px;
            right:-120px;
        }

        .container{
            position:relative;
            z-index:2;
            width:90%;
            max-width:950px;
            padding:60px;
            border-radius:30px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.15);
            backdrop-filter:blur(20px);
            box-shadow:0 25px 60px rgba(0,0,0,0.4);
            text-align:center;
            color:white;
        }

        .logo{
            width:90px;
            height:90px;
            margin:0 auto 25px;
            border-radius:25px;
            background:linear-gradient(135deg,#8b5cf6,#06b6d4);
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:2rem;
            font-weight:700;
            box-shadow:0 15px 35px rgba(0,0,0,0.3);
        }

        h1{
            font-size:4rem;
            margin-bottom:15px;
            line-height:1.1;
        }

        h1 span{
            background:linear-gradient(to right,#38bdf8,#c084fc);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
        }

        p{
            max-width:650px;
            margin:0 auto 40px;
            color:#cbd5e1;
            line-height:1.8;
            font-size:1.05rem;
        }

        .buttons{
            display:flex;
            justify-content:center;
            gap:20px;
            flex-wrap:wrap;
        }

        .btn{
            text-decoration:none;
            padding:16px 40px;
            border-radius:14px;
            font-weight:600;
            transition:0.35s ease;
            position:relative;
            overflow:hidden;
        }

        .btn-login{
            background:linear-gradient(135deg,#8b5cf6,#6366f1);
            color:white;
            box-shadow:0 12px 30px rgba(99,102,241,0.4);
        }

        .btn-register{
            border:1px solid rgba(255,255,255,0.2);
            color:white;
            background:rgba(255,255,255,0.08);
            backdrop-filter:blur(10px);
        }

        .btn:hover{
            transform:translateY(-5px) scale(1.03);
        }

        .stats{
            margin-top:55px;
            display:flex;
            justify-content:center;
            gap:60px;
            flex-wrap:wrap;
        }

        .stat h2{
            font-size:2rem;
        }

        .stat p{
            margin-top:5px;
            font-size:0.95rem;
            color:#94a3b8;
        }

        @media(max-width:768px){
            h1{
                font-size:2.7rem;
            }

            .container{
                padding:40px 25px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">CFS</div>

        <h1>Welcome to <span>CodeForSuccess</span></h1>

        <p>
            Build your future with coding, creativity, and innovation.
            Experience a sleek modern platform designed for aspiring developers
            who want to learn, grow, and succeed.
        </p>

        <div class="buttons">
            <a href="login.html" class="btn btn-login">Login</a>
            <a href="reg.html" class="btn btn-register">Create Account</a>
        </div>

        <div class="stats">
            <div class="stat">
                <h2>10K+</h2>
                <p>Developers Inspired</p>
            </div>

            <div class="stat">
                <h2>50+</h2>
                <p>Projects Created</p>
            </div>

            <div class="stat">
                <h2>24/7</h2>
                <p>Learning Experience</p>
            </div>
        </div>
    </div>

</body>
</html>
