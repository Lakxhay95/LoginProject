<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | CodeForSuccess</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#111827,#312e81,#7c3aed);
            position:relative;
            overflow:hidden;
        }

        body::before,
        body::after{
            content:'';
            position:absolute;
            border-radius:50%;
            filter:blur(110px);
            opacity:0.45;
        }

        body::before{
            width:300px;
            height:300px;
            background:#06b6d4;
            top:-80px;
            left:-80px;
        }

        body::after{
            width:350px;
            height:350px;
            background:#a855f7;
            bottom:-120px;
            right:-100px;
        }

        .register-box{
            width:450px;
            padding:45px;
            border-radius:28px;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.12);
            backdrop-filter:blur(20px);
            box-shadow:0 25px 60px rgba(0,0,0,0.4);
            color:white;
            position:relative;
            z-index:2;
        }

        h1{
            text-align:center;
            margin-bottom:12px;
            font-size:2.3rem;
        }

        .subtitle{
            text-align:center;
            color:#d1d5db;
            margin-bottom:35px;
        }

        .input-group{
            margin-bottom:20px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            color:#f3f4f6;
            font-size:0.95rem;
        }

        .input-group input{
            width:100%;
            padding:15px;
            border-radius:14px;
            border:none;
            outline:none;
            background:rgba(255,255,255,0.08);
            border:1px solid rgba(255,255,255,0.08);
            color:white;
            font-size:1rem;
            transition:0.3s;
        }

        .input-group input:focus{
            border-color:#c084fc;
            box-shadow:0 0 0 4px rgba(192,132,252,0.2);
        }

        .input-group input::placeholder{
            color:#9ca3af;
        }

        .btn{
            width:100%;
            padding:16px;
            border:none;
            border-radius:14px;
            background:linear-gradient(135deg,#c084fc,#6366f1);
            color:white;
            font-size:1rem;
            font-weight:600;
            cursor:pointer;
            transition:0.35s;
            margin-top:10px;
            box-shadow:0 15px 35px rgba(139,92,246,0.4);
        }

        .btn:hover{
            transform:translateY(-4px);
        }

        .footer-text{
            margin-top:24px;
            text-align:center;
            color:#d1d5db;
            font-size:0.92rem;
        }

        .footer-text a{
            color:#ddd6fe;
            text-decoration:none;
            font-weight:600;
        }

        @media(max-width:500px){
            .register-box{
                width:92%;
                padding:35px 25px;
            }
        }
    </style>
</head>
<body>

    <form method="post" action="reg" class="register-box">
        <h1>Create Account</h1>
        <p class="subtitle">Join the next generation of developers</p>

        <div class="input-group">
            <label>First Name</label>
            <input type="text" name="fname" placeholder="Enter first name">
        </div>

        <div class="input-group">
            <label>Last Name</label>
            <input type="text" name="lname" placeholder="Enter last name">
        </div>

        <div class="input-group">
            <label>Username</label>
            <input type="text" name="uname" placeholder="Choose a username">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="pword" placeholder="Create a password">
        </div>

        <input type="submit" value="Create Account" class="btn">

        <div class="footer-text">
            Already have an account?
            <a href="login.html">Login</a>
        </div>
    </form>

</body>
</html>
